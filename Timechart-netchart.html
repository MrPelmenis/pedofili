<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaP Research Timeline</title>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #111;
            --sf: #161616;
            --bd: #222;
            --tx: #e0e0e0;
            --tx2: #666;
            --ac: #00d4aa;
            --f: 'IBM Plex Sans', -apple-system, sans-serif;
            --m: 'IBM Plex Mono', monospace
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: var(--bg);
            color: var(--tx);
            font-family: var(--f);
            height: 100vh;
            overflow: hidden
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh
        }

        .hdr {
            padding: 18px 28px 14px;
            border-bottom: 1px solid var(--bd);
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            flex-shrink: 0
        }

        .hdr h1 {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: -.01em
        }

        .hdr h1 span {
            color: var(--ac);
            font-weight: 400
        }

        .hdr-logo {
            height: 22px;
            opacity: 1;
            transition: opacity .15s;
            vertical-align: middle;
            margin-left: 10px
        }

        .hdr-logo:hover {
            opacity: 1
        }

        .meta {
            display: flex;
            gap: 18px;
            font-size: .73rem;
            color: var(--tx2);
            font-family: var(--m)
        }

        .meta b {
            color: var(--tx);
            font-weight: 500
        }

        .ctl {
            padding: 9px 28px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--bd);
            flex-shrink: 0
        }

        .sw {
            position: relative;
            flex: 1 1 200px;
            max-width: 320px
        }

        .sw input {
            width: 100%;
            padding: 7px 10px 7px 30px;
            background: var(--sf);
            border: 1px solid var(--bd);
            border-radius: 3px;
            color: var(--tx);
            font-family: var(--f);
            font-size: .8rem;
            outline: none;
            transition: border .15s
        }

        .sw input:focus {
            border-color: var(--ac)
        }

        .sw input::placeholder {
            color: var(--tx2)
        }

        .sw svg {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--tx2);
            width: 14px;
            height: 14px
        }

        .rng {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1 1 260px;
            max-width: 420px
        }

        .rng .rv {
            font-size: .72rem;
            font-family: var(--m);
            color: var(--ac);
            min-width: 32px;
            text-align: center
        }

        .rng-wrap {
            position: relative;
            flex: 1;
            height: 28px;
            display: flex;
            align-items: center
        }

        .rng-track {
            position: absolute;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--bd);
            border-radius: 2px
        }

        .rng-fill {
            position: absolute;
            height: 3px;
            background: var(--ac);
            border-radius: 2px;
            opacity: .5
        }

        .rng-wrap input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            position: absolute;
            width: 100%;
            height: 28px;
            background: transparent;
            pointer-events: none;
            margin: 0
        }

        .rng-wrap input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 2px;
            background: var(--ac);
            cursor: pointer;
            pointer-events: auto;
            border: none;
            position: relative;
            z-index: 2
        }

        .rng-wrap input[type=range]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 2px;
            background: var(--ac);
            cursor: pointer;
            pointer-events: auto;
            border: none
        }

        .rng-wrap input[type=range]::-webkit-slider-runnable-track {
            background: transparent
        }

        .rng-wrap input[type=range]::-moz-range-track {
            background: transparent
        }

        .btn {
            padding: 6px 13px;
            background: transparent;
            border: 1px solid var(--bd);
            border-radius: 3px;
            color: var(--tx2);
            font-family: var(--f);
            font-size: .73rem;
            cursor: pointer;
            transition: all .15s
        }

        .btn:hover {
            border-color: var(--tx);
            color: var(--tx)
        }

        .cnt {
            margin-left: auto;
            font-size: .7rem;
            color: var(--tx2);
            font-family: var(--m)
        }

        .main {
            display: grid;
            grid-template-columns: 194px 1fr;
            flex: 1;
            overflow: hidden
        }

        .side {
            border-right: 1px solid var(--bd);
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .stop {
            padding: 11px 14px 7px;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            font-size: .63rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--tx2)
        }

        .stop a {
            color: var(--tx2);
            text-decoration: none;
            cursor: pointer;
            font-size: .63rem;
            transition: color .12s
        }

        .stop a:hover {
            color: var(--ac)
        }

        .stop .s {
            margin: 0 3px;
            opacity: .3
        }

        .pl {
            flex: 1;
            overflow-y: auto
        }

        .pi {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 5px 14px;
            cursor: pointer;
            font-size: .76rem;
            transition: opacity .1s;
            user-select: none
        }

        .pi:hover {
            background: rgba(255, 255, 255, .025)
        }

        .pi.off {
            opacity: .18
        }

        .pd {
            width: 7px;
            height: 7px;
            border-radius: 1px;
            flex-shrink: 0
        }

        .pn {
            flex: 1;
            line-height: 1.2
        }

        .pc {
            font-size: .63rem;
            color: var(--tx2);
            font-family: var(--m)
        }

        .content {
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .cp {
            padding: 14px 24px 6px;
            flex-shrink: 0
        }

        .cp .lb {
            font-size: .68rem;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--tx2);
            margin-bottom: 6px
        }

        #tc {
            width: 100%;
            height: 420px;
            border: 1px solid var(--bd);
            border-radius: 3px;
            overflow: hidden;
            position: relative
        }

        #cv {
            width: 100%;
            height: 100%;
            cursor: grab
        }

        #cv:active {
            cursor: grabbing
        }

        .tp {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 6px 24px 14px
        }

        .tp .lb {
            font-size: .68rem;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--tx2);
            margin-bottom: 5px
        }

        .tw {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--bd);
            border-radius: 3px
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: .76rem
        }

        thead th {
            padding: 7px 10px;
            text-align: left;
            font-weight: 500;
            font-size: .66rem;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--tx2);
            border-bottom: 1px solid var(--bd);
            position: sticky;
            top: 0;
            background: var(--bg);
            cursor: pointer;
            user-select: none;
            white-space: nowrap
        }

        thead th:hover {
            color: var(--tx)
        }

        thead th .sa {
            margin-left: 2px;
            opacity: .3;
            font-size: .58rem
        }

        thead th.on .sa {
            opacity: 1;
            color: var(--ac)
        }

        tbody tr {
            border-bottom: 1px solid var(--bd)
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, .02)
        }

        td {
            padding: 6px 10px;
            vertical-align: top
        }

        .ty {
            font-family: var(--m);
            font-weight: 500;
            color: var(--ac);
            font-size: .74rem
        }

        .tpr {
            white-space: nowrap
        }

        .tpr .d {
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 1px;
            margin-right: 4px;
            vertical-align: middle
        }

        .tre {
            color: var(--tx2)
        }

        .trf {
            color: var(--tx2);
            font-size: .72rem;
            max-width: 360px;
            line-height: 1.35
        }

        .trf a {
            color: var(--lc, var(--ac));
            text-decoration: none;
            word-break: break-all
        }

        .trf a:hover {
            text-decoration: underline
        }

        mark {
            background: rgba(0, 212, 170, .12);
            color: var(--ac);
            border-radius: 1px;
            padding: 0 1px
        }

        .tt {
            position: fixed;
            pointer-events: none;
            background: #1a1a1a;
            border: 1px solid var(--bd);
            border-radius: 3px;
            padding: 10px 13px;
            max-width: 320px;
            font-size: .76rem;
            line-height: 1.45;
            z-index: 100;
            box-shadow: 0 8px 30px rgba(0, 0, 0, .5);
            opacity: 0;
            transition: opacity .12s
        }

        .tt.show {
            opacity: 1
        }

        .tt .ty2 {
            color: var(--ac);
            font-weight: 600;
            font-family: var(--m);
            font-size: .74rem
        }

        .tt .tr2 {
            color: var(--tx2);
            margin-top: 1px;
            font-size: .72rem
        }

        .tt .tm {
            margin-top: 5px
        }

        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bd);
            border-radius: 2px
        }

        .btn-net {
            background: rgba(0, 212, 170, .08);
            border-color: rgba(0, 212, 170, .3);
            color: var(--ac)
        }

        .btn-net:hover {
            background: rgba(0, 212, 170, .15);
            border-color: var(--ac)
        }

        .net-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, .85);
            display: none;
            flex-direction: column;
            opacity: 0;
            transition: opacity .25s
        }

        .net-overlay.open {
            display: flex;
            opacity: 1
        }

        .net-bar {
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--bd);
            flex-shrink: 0
        }

        .net-tt {
            position: absolute;
            z-index: 20;
            pointer-events: none;
            background: #1a1a1a;
            border: 1px solid var(--bd);
            border-radius: 4px;
            padding: 10px 13px;
            max-width: 360px;
            font-size: 13px;
            line-height: 1.5;
            font-family: var(--f);
            color: var(--tx);
            box-shadow: 0 8px 30px rgba(0, 0, 0, .5);
            opacity: 0;
            transition: opacity .15s;
            transform: translate(-50%, -100%)
        }

        .net-tt.show {
            opacity: 1
        }

        .net-bar h2 {
            font-size: .95rem;
            font-weight: 600;
            color: var(--tx)
        }

        .net-bar h2 span {
            color: var(--ac);
            font-weight: 400;
            margin-left: 6px;
            font-size: .78rem
        }

        .net-close {
            background: none;
            border: 1px solid var(--bd);
            border-radius: 3px;
            color: var(--tx2);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all .15s
        }

        .net-close:hover {
            border-color: var(--tx);
            color: var(--tx)
        }

        .net-body {
            flex: 1;
            position: relative;
            overflow: hidden
        }

        #netChart {
            width: 100%;
            height: 100%
        }

        .net-legend {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(17, 17, 17, .92);
            border: 1px solid var(--bd);
            border-radius: 4px;
            padding: 10px 14px;
            max-height: 40vh;
            overflow-y: auto;
            z-index: 10;
            max-width: 240px
        }

        .net-legend .nl-title {
            font-size: .62rem;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--tx2);
            margin-bottom: 6px
        }

        .nl-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 2px 0;
            font-size: .72rem;
            color: var(--tx)
        }

        .nl-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            flex-shrink: 0
        }

        .net-info {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(17, 17, 17, .92);
            border: 1px solid var(--bd);
            border-radius: 4px;
            padding: 10px 14px;
            font-size: .72rem;
            color: var(--tx2);
            font-family: var(--m);
            z-index: 10
        }

        .net-info b {
            color: var(--ac);
            font-weight: 500
        }

        .net-tog {
            padding: 5px 11px;
            background: transparent;
            border: 1px solid var(--bd);
            border-radius: 3px;
            color: var(--tx2);
            font-family: var(--f);
            font-size: .7rem;
            cursor: pointer;
            transition: all .15s;
            white-space: nowrap
        }

        .net-tog:hover {
            border-color: var(--tx);
            color: var(--tx)
        }

        .net-tog.on {
            background: rgba(0, 212, 170, .1);
            border-color: rgba(0, 212, 170, .4);
            color: var(--ac)
        }

        @media(max-width:900px) {
            .main {
                grid-template-columns: 1fr
            }

            .side {
                border-right: none;
                border-bottom: 1px solid var(--bd);
                max-height: 150px
            }

            .hdr {
                padding: 12px 16px
            }

            .ctl {
                padding: 7px 16px
            }

            .cp,
            .tp {
                padding-left: 16px;
                padding-right: 16px
            }
        }
    </style>
</head>

    <div class="app">
        <header class="hdr">
            <h1> <span>CaP Research Timeline</span> - made with <a href="https://chartizer.com/" target="_blank">

            <div class="meta">

        <div class="ctl">
            <div class="sw">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />

                <input type="text" id="si" placeholder="Search…">

            <div class="rng">

                <span class="rv" id="rvR">2025</span>

            <button class="btn btn-net" id="bnet">⬡ Network</button>
            <button class="btn" id="br">Reset</button>
            <div class="cnt" id="rc">211 shown</div>
        </div>
        <div class="main">
            <aside class="side">
                <div class="stop">
                    <span>Properties</span>
                    <div><a id="ba">All</a><span class="s">/</span><a id="bn">None</a></div>
                </div>
                <div class="pl" id="pl"></div>
            </aside>
            <div class="content">
                <div class="cp">
                    <div class="lb">Timeline – scroll to zoom, drag to pan</div>
                    <div id="tc"><canvas id="cv"></canvas></div>

                <div class="tp">

                    <div class="tw">

                                    <th data-s="milestone">Milestone <span class="sa">↕</span></th>
                                    <th data-s="reference">Reference <span class="sa">↕</span></th>
                                </tr>
                            </thead>
                            <tbody id="tb"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="tt" id="tt"></div>

                netAllLinks.push({
                    id: l.from + '_' + l.to + '_' + l.type, from: l.from, to: l.to,
                    style: { fillColor: isCitation ? 'rgba(255,255,255,0.4)' : 'rgba(255,152,0,0.3)', toDecoration: isCitation ? 'arrow' : 'none' },
                    extra: { linkType: l.type, fromId: l.from, toId: l.to }
                });
            });
        }

        function isNetNodeVisible(nodeData) {
            var ex = nodeData.extra || {};
            if (ex.nodeType === 'paper') {
                var prop = ex.property;
                if (!prop || !active.has(prop)) return false;
                var yr = ex.year;
                if (yr != null && (yr < yF || yr > yT)) return false;
                if (q) {
                    var s = q.toLowerCase();
                    if (!(ex.milestone || '').toLowerCase().includes(s) && !(ex.title || '').toLowerCase().includes(s) && !(prop || '').toLowerCase().includes(s)) return false;
                }
                if (linkedOnly && !netCitedPapers.has(nodeData.id)) return false;
                return true;
            }
            if (ex.nodeType === 'author') {
                if (!showAuthors) return false;
                var pids = netAuthorPapers[nodeData.id] || [];
                for (var i = 0; i < pids.length; i++) {
                    var pp = netPaperProps[pids[i]];
                    if (!pp || !active.has(pp)) continue;
                    var py = netPaperYears[pids[i]];
                    if (py != null && (py < yF || py > yT)) continue;
                    if (linkedOnly && !netCitedPapers.has(pids[i])) continue;
                    return true;
                }
                return false;
            }
            return false;
        }

        function buildNetwork() {
            if (!NETWORK_DATA) return;
            if (netChart) { netChart.remove(); netChart = null }
            prepNetData();
            renderNetLegend();
            updateNetInfo();

            netChart = new NetChart({
                container: document.getElementById('netChart'),
                area: { height: null },
                data: { preloaded: { nodes: netAllNodes, links: netAllLinks } },
                filters: {
                    nodeFilter: function (nodeData) { return isNetNodeVisible(nodeData) },
                    linkFilter: function (linkData) {
                        var ex = linkData.extra || {};
                        if (!showAuthors && ex.linkType === 'authored') return false;
                        return true;
                    }
                },
                style: {
                    node: { display: 'roundrect', cornerRadius: 4, shadowBlur: 0, onImageLoadError: 'remove' },
                    link: { fillColor: 'rgba(255,255,255,0.35)', radius: 0.7, toDecoration: 'arrow' },
                    nodeHovered: { shadowBlur: 10, shadowColor: 'rgba(0,212,170,0.4)' },
                    nodeDetailMinSize: 1, nodeDetailMinZoom: 0,
                    selection: { enabled: false },
                    nodeStyleFunction: function (node) {
                        var s = node.data.style || {};
                        node.display = 'roundrect';
                        node.cornerRadius = s.cornerRadius || 4;
                        node.radius = 0;
                        node.fillColor = 'transparent';
                        node.label = '';
                        node.items = s.items || [];
                    },
                    linkStyleFunction: function (link) {
                        var s = link.data.style || {};
                        link.fillColor = s.fillColor || 'rgba(255,255,255,0.35)';
                        link.radius = 0.7; link.toDecoration = s.toDecoration || 'arrow';
                    }
                },
                interaction: { zooming: { autoZoomExtent: [0.001, 200], zoomExtent: [0.001, 200] } },
                events: {
                    onClick: function (e, args) {
                        if (args.clickNode) {
                            var ex = args.clickNode.data.extra || {};
                            if (ex.nodeType === 'paper' && ex.url) window.open(ex.url, '_blank');
                            if (ex.nodeType === 'author') window.open('https://www.semanticscholar.org/author/' + args.clickNode.id, '_blank');
                        }
                    },
                    onHoverChange: function (e, args) {
                        var tt = document.getElementById('netTt');
                        var rect = document.getElementById('netChart').getBoundingClientRect();
                        if (args.hoverNode) {
                            var ex = args.hoverNode.data.extra || {};
                            var h = '';
                            if (ex.nodeType === 'paper') {
                                h += '<div style="font-weight:600;color:' + (ex.color || '#ccc') + '">' + ex.title + '</div>';
                                if (ex.property) h += '<div style="margin-top:4px;font-size:11px;color:#888">' + ex.property + '</div>';
                                if (ex.year) h += '<div style="font-size:11px;color:#888">Year: ' + ex.year + ' · Citations: ' + (ex.citations || 0) + '</div>';
                                h += '<div style="margin-top:4px;font-size:11px;color:#aaa">' + ex.milestone + '</div>';
                                if (ex.url) h += '<div style="margin-top:6px"><span style="color:#00d4aa;font-size:11px">Click node to open paper →</span></div>';
                            } else {
                                h += '<div style="font-weight:600;color:#FF9800">' + ex.name + '</div>';
                                h += '<div style="font-size:11px;color:#888;margin-top:2px">Papers authored: ' + (ex.papers || 0) + '</div>';
                                h += '<div style="margin-top:4px"><span style="color:#00d4aa;font-size:11px">Click to open profile →</span></div>';
                            }
                            tt.innerHTML = h;
                            tt.style.left = (e.pageX - rect.left) + 'px';
                            tt.style.top = (e.pageY - rect.top - 20) + 'px';
                            tt.classList.add('show');
                        } else if (args.hoverLink) {
                            var lex = args.hoverLink.data.extra || {};
                            var fromEx = netNodeLookup[lex.fromId] || {};
                            var toEx = netNodeLookup[lex.toId] || {};
                            var h = '';
                            if (lex.linkType === 'citation') {
                                var fromName = fromEx.title || fromEx.name || lex.fromId;
                                var toName = toEx.title || toEx.name || lex.toId;
                                h += '<div style="font-size:11px;color:var(--ac)">Citation</div>';
                                h += '<div style="margin-top:4px;font-size:12px"><span style="color:' + (fromEx.color || '#fff') + '">' + fromName + '</span></div>';
                                h += '<div style="font-size:10px;color:#888;margin:3px 0">cites →</div>';
                                h += '<div style="font-size:12px"><span style="color:' + (toEx.color || '#fff') + '">' + toName + '</span></div>';
                            } else if (lex.linkType === 'authored') {
                                var authorEx = fromEx.nodeType === 'author' ? fromEx : toEx;
                                var paperEx = fromEx.nodeType === 'paper' ? fromEx : toEx;
                                h += '<div style="font-size:11px;color:#FF9800">Authored</div>';
                                h += '<div style="margin-top:4px;font-size:12px;color:#FF9800">' + authorEx.name + '</div>';
                                h += '<div style="font-size:10px;color:#888;margin:3px 0">authored →</div>';
                                h += '<div style="font-size:12px;color:' + (paperEx.color || '#fff') + '">' + paperEx.title + '</div>';
                            }
                            tt.innerHTML = h;
                            tt.style.left = (e.pageX - rect.left) + 'px';
                            tt.style.top = (e.pageY - rect.top - 20) + 'px';
                            tt.classList.add('show');
                        } else {
                            tt.classList.remove('show');
                        }
                    }
                },
                info: { enabled: false },
                navigation: { mode: 'showall' },
                layout: { mode: 'dynamic', nodeSpacing: 80, gravitationalConstant: 0.1 },
                toolbar: { enabled: true }
            });
        }

        function applyNetFilter() {
            if (!netChart) { buildNetwork(); return }
            netChart.updateFilters();
            renderNetLegend();
            updateNetInfo();
        }

        function updateNetInfo() {
            if (!netAllNodes) return;
            var pc = 0, ac = 0;
            netAllNodes.forEach(function (n) {
                if (!isNetNodeVisible(n)) return;
                if (n.extra.nodeType === 'paper') pc++;
                else if (n.extra.nodeType === 'author') ac++;
            });
            document.getElementById('netInfo').innerHTML = '<b>' + pc + '</b> papers · <b>' + ac + '</b> authors';
        }

        function buildMafia() {
            if (!NETWORK_DATA) return;
            if (netChart) { netChart.remove(); netChart = null }
            netAllNodes = null; netAllLinks = null;

            var filtered = filt();
            var filteredMilestones = new Set(filtered.map(function (d) { return d.milestone }));
            var paperToAuthors = {};
            var authorMap = {};
            var paperSet = new Set();

            NETWORK_DATA.nodes.forEach(function (n) {
                if (n.node_type === 'paper' && n.milestone && filteredMilestones.has(n.milestone)) paperSet.add(n.id);
                if (n.node_type === 'author') authorMap[n.id] = n;
            });

            NETWORK_DATA.links.forEach(function (l) {
                if (l.type === 'authored' && paperSet.has(l.to)) {
                    if (!paperToAuthors[l.to]) paperToAuthors[l.to] = [];
                    paperToAuthors[l.to].push(l.from);
                }
            });

            var authorLinks = {};
            NETWORK_DATA.links.forEach(function (l) {
                if (l.type !== 'citation' || !paperSet.has(l.from) || !paperSet.has(l.to)) return;
                var ca = paperToAuthors[l.from] || [];
                var ta = paperToAuthors[l.to] || [];
                ca.forEach(function (a) {
                    ta.forEach(function (b) {
                        if (a === b) return;
                        authorLinks[a + '|' + b] = (authorLinks[a + '|' + b] || 0) + 1;
                    })
                });
            });

            var allAuthors = new Set();
            Object.keys(paperToAuthors).forEach(function (pid) {
                paperToAuthors[pid].forEach(function (aid) { allAuthors.add(aid) });
            });

            var connectedAuthors = new Set();
            var linkEntries = [];
            Object.keys(authorLinks).forEach(function (key) {
                var p = key.split('|');
                connectedAuthors.add(p[0]); connectedAuthors.add(p[1]);
                linkEntries.push({ from: p[0], to: p[1], weight: authorLinks[key] });
            });

            var coauthorLinks = {};
            Object.keys(paperToAuthors).forEach(function (pid) {
                var a = paperToAuthors[pid];
                for (var i = 0; i < a.length; i++) {
                    for (var j = i + 1; j < a.length; j++) {
                        var key = a[i] < a[j] ? a[i] + '|' + a[j] : a[j] + '|' + a[i];
                        coauthorLinks[key] = (coauthorLinks[key] || 0) + 1;
                        connectedAuthors.add(a[i]); connectedAuthors.add(a[j]);
                    }
                }
            });

            var usedNodes = []; var nodeMap = {};
            allAuthors.forEach(function (aid) {
                var n = authorMap[aid]; if (!n) return;
                var aName = n.name || n.label || '';
                var aPapers = n.papers_authored || 1;
                var aScale = Math.max(0, Math.min(Math.sqrt(aPapers) / Math.sqrt(700), 1));
                var aFontSize = Math.round(8 + aScale * 4);
                var aPad = Math.round(3 + aScale * 5);
                var linkCount = 0;
                linkEntries.forEach(function (le) { if (le.from === aid || le.to === aid) linkCount += le.weight });
                usedNodes.push({
                    id: aid, loaded: true,
                    style: {
                        label: aName, fillColor: '#FF9800', radius: Math.max(14, Math.min(10 + Math.sqrt(linkCount) * 5, 50)), display: 'roundrect', cornerRadius: 14,
                        items: [{ scaleWithZoom: true, text: aName, textStyle: { fillColor: '#000', font: '600 ' + aFontSize + 'px IBM Plex Sans' }, padding: aPad, backgroundStyle: { fillColor: hexA('#FF9800', 0.92), lineColor: 'none', cornerRadius: 14 } }]
                    },
                    extra: { nodeType: 'author', name: aName, papers: aPapers, linkCount: linkCount, color: '#FF9800' }
                });
                nodeMap[aid] = true;
            });

            var mafiaNodeLookup = {};
            usedNodes.forEach(function (n) { mafiaNodeLookup[n.id] = n.extra });

            var usedLinks = [];
            linkEntries.forEach(function (le) {
                if (!nodeMap[le.from] || !nodeMap[le.to]) return;
                usedLinks.push({
                    id: 'c_' + le.from + '_' + le.to, from: le.from, to: le.to,
                    style: { fillColor: 'rgba(255,255,255,' + (0.15 + Math.min(le.weight * 0.15, 0.7)) + ')', toDecoration: 'arrow', radius: Math.min(0.5 + le.weight * 2, 12) },
                    extra: { linkType: 'cross-citation', fromId: le.from, toId: le.to, weight: le.weight }
                });
            });
            Object.keys(coauthorLinks).forEach(function (key) {
                var p = key.split('|');
                if (!nodeMap[p[0]] || !nodeMap[p[1]]) return;
                var w = coauthorLinks[key];
                usedLinks.push({
                    id: 'a_' + key, from: p[0], to: p[1],
                    style: { fillColor: 'rgba(0,212,170,' + (0.2 + Math.min(w * 0.2, 0.6)) + ')', toDecoration: 'none', radius: Math.min(0.5 + w * 0.5, 5) },
                    extra: { linkType: 'co-authorship', fromId: p[0], toId: p[1], weight: w }
                });
            });

            document.getElementById('netInfo').innerHTML = '<b>' + usedNodes.length + '</b> authors · <b>' + linkEntries.length + '</b> cross-citations · <b>' + Object.keys(coauthorLinks).length + '</b> co-authorships';
            renderNetLegend(true);

            netChart = new NetChart({
                container: document.getElementById('netChart'),
                area: { height: null },
                data: { preloaded: { nodes: usedNodes, links: usedLinks } },
                style: {
                    node: { display: 'roundrect', cornerRadius: 14, shadowBlur: 0, onImageLoadError: 'remove' },
                    link: { fillColor: 'rgba(255,255,255,0.3)', radius: 0.7, toDecoration: 'arrow' },
                    nodeHovered: { shadowBlur: 12, shadowColor: 'rgba(255,152,0,0.5)' },
                    nodeDetailMinSize: 1, nodeDetailMinZoom: 0,
                    selection: { enabled: false },
                    nodeStyleFunction: function (node) {
                        var s = node.data.style || {};
                        node.display = 'roundrect';
                        node.cornerRadius = s.cornerRadius || 14;
                        node.radius = 0;
                        node.fillColor = 'transparent';
                        node.label = '';
                        node.items = s.items || [];
                    },
                    linkStyleFunction: function (link) {
                        var s = link.data.style || {};
                        link.fillColor = s.fillColor || 'rgba(255,255,255,0.3)';
                        link.radius = s.radius || 0.7; link.toDecoration = s.toDecoration || 'arrow';
                    }
                },
                interaction: { zooming: { autoZoomExtent: [0.001, 200], zoomExtent: [0.001, 200] } },
                events: {
                    onClick: function (e, args) {
                        if (args.clickNode) window.open('https://www.semanticscholar.org/author/' + args.clickNode.id, '_blank');
                    },
                    onHoverChange: function (e, args) {
                        var tt = document.getElementById('netTt');
                        var rect = document.getElementById('netChart').getBoundingClientRect();
                        if (args.hoverNode) {
                            var ex = args.hoverNode.data.extra || {};
                            var h = '<div style="font-weight:600;color:#FF9800">' + ex.name + '</div>';
                            h += '<div style="font-size:11px;color:#888;margin-top:2px">Papers authored: ' + (ex.papers || 0) + '</div>';
                            h += '<div style="font-size:11px;color:#888">Cross-ref connections: ' + (ex.linkCount || 0) + '</div>';
                            h += '<div style="margin-top:4px"><span style="color:#00d4aa;font-size:11px">Click to open profile →</span></div>';
                            tt.innerHTML = h;
                            tt.style.left = (e.pageX - rect.left) + 'px';
                            tt.style.top = (e.pageY - rect.top - 20) + 'px';
                            tt.classList.add('show');
                        } else if (args.hoverLink) {
                            var lex = args.hoverLink.data.extra || {};
                            var fromEx = mafiaNodeLookup[lex.fromId] || {};
                            var toEx = mafiaNodeLookup[lex.toId] || {};
                            var h = '';
                            if (lex.linkType === 'cross-citation') {
                                h += '<div style="font-size:11px;color:rgba(255,255,255,0.7)">Cross-citation × ' + (lex.weight || 1) + '</div>';
                                h += '<div style="margin-top:4px;font-size:12px;color:#FF9800">' + (fromEx.name || '') + '</div>';
                                h += '<div style="font-size:10px;color:#888;margin:3px 0">cites work by →</div>';
                                h += '<div style="font-size:12px;color:#FF9800">' + (toEx.name || '') + '</div>';
                            } else {
                                h += '<div style="font-size:11px;color:var(--ac)">Co-authored × ' + (lex.weight || 1) + '</div>';
                                h += '<div style="margin-top:4px;font-size:12px;color:#FF9800">' + (fromEx.name || '') + ' & ' + (toEx.name || '') + '</div>';
                            }
                            tt.innerHTML = h;
                            tt.style.left = (e.pageX - rect.left) + 'px';
                            tt.style.top = (e.pageY - rect.top - 20) + 'px';
                            tt.classList.add('show');
                        } else {
                            tt.classList.remove('show');
                        }
                    }
                },
                info: { enabled: false },
                navigation: { mode: 'showall' },
                layout: { mode: 'dynamic', nodeSpacing: 100, gravitationalConstant: 0.08 },
                toolbar: { enabled: true }
            });
        }

        function renderNetLegend(isMafia) {
            var legendEl = document.getElementById('netLegend');
            var title = isMafia ? 'Science Mafia Map' : 'Properties';
            legendEl.innerHTML = '<div class="nl-title">' + title + ' <span style="float:right;font-size:.58rem;cursor:pointer;color:var(--ac)" id="nlAll">all</span> <span style="float:right;font-size:.58rem;cursor:pointer;color:var(--tx2);margin-right:6px" id="nlNone">none</span></div>' +
                PROPS.map(function (p) {
                    return '<div class="nl-item nl-filterable" data-prop="' + p + '" style="cursor:pointer;opacity:' + (active.has(p) ? '1' : '0.25') + '"><div class="nl-dot" style="background:' + CM[p] + '"></div>' + p + '</div>';
                }).join('') +
                (isMafia ? '<div style="margin-top:8px;border-top:1px solid #333;padding-top:6px"><div class="nl-item"><div class="nl-dot" style="background:#FF9800;border-radius:50%"></div>Author</div><div class="nl-item"><div class="nl-dot" style="background:rgba(255,255,255,0.5)"></div>Cross-citation</div><div class="nl-item"><div class="nl-dot" style="background:var(--ac)"></div>Co-authorship</div></div>' :
                    (showAuthors ? '<div class="nl-item" style="margin-top:6px;border-top:1px solid #333;padding-top:6px"><div class="nl-dot" style="background:#FF9800;border-radius:50%"></div>Author</div>' : ''));
            legendEl.querySelectorAll('.nl-filterable').forEach(function (el) {
                el.addEventListener('click', function () {
                    var p = el.dataset.prop;
                    if (active.has(p)) active.delete(p); else active.add(p);
                    upd();
                    if (mafiaMode) { buildMafia() } else { applyNetFilter() }
                });
            });
            document.getElementById('nlAll').addEventListener('click', function () {
                active = new Set(PROPS); upd();
                if (mafiaMode) { buildMafia() } else { applyNetFilter() }
            });
            document.getElementById('nlNone').addEventListener('click', function () {
                active.clear(); upd();
                if (mafiaMode) { buildMafia() } else { applyNetFilter() }
            });
        }

        document.getElementById('togAuthors').addEventListener('click', function () {
            showAuthors = !showAuthors;
            this.classList.toggle('on', showAuthors);
            if (!NETWORK_DATA) return;
            if (mafiaMode) buildMafia(); else applyNetFilter();
        });
        document.getElementById('togLinked').addEventListener('click', function () {
            linkedOnly = !linkedOnly;
            this.classList.toggle('on', linkedOnly);
            if (!NETWORK_DATA) return;
            if (mafiaMode) buildMafia(); else applyNetFilter();
        });
        document.getElementById('togMafia').addEventListener('click', function () {
            mafiaMode = !mafiaMode;
            this.classList.toggle('on', mafiaMode);
            document.getElementById('togAuthors').style.opacity = mafiaMode ? '0.3' : '1';
            document.getElementById('togAuthors').style.pointerEvents = mafiaMode ? 'none' : 'auto';
            document.getElementById('togLinked').style.opacity = mafiaMode ? '0.3' : '1';
            document.getElementById('togLinked').style.pointerEvents = mafiaMode ? 'none' : 'auto';
            if (!NETWORK_DATA) return;
            if (mafiaMode) buildMafia(); else buildNetwork();
        });

        document.getElementById('bnet').addEventListener('click', openNetwork);
        document.getElementById('netClose').addEventListener('click', closeNetwork);
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && document.getElementById('netOverlay').classList.contains('open')) closeNetwork();
        });

    </script>
</body>

</html>
